<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 상세보기</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4" style="width: 600px;">
        <h1 class="text-center mb-4">게시글 상세보기</h1>
        <table class="table table-bordered mb-4">
            <tbody>
                <tr>
                    <th scope="row" class="table-light">제목</th>
                    <td>가입인사</td>
                </tr>
                <tr>
                    <th scope="row" class="table-light">작성자</th>
                    <td>msriver</td>
                </tr>
                <tr>
                    <th scope="row" class="table-light">작성시간</th>
                    <td>2020-06-03 20:20</td>
                </tr>
                <tr>
                    <th scope="row" class="table-light">내용</th>
                    <td>
                        안녕하세요<br>
                        1<br>
                        2<br>
                        3<br>
                        4
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="d-flex justify-content-between">
            <button class="btn btn-info text-white" onclick="writeNew()">새 글 작성</button>
            <button class="btn btn-warning text-white" onclick="editPost()">글 수정</button>
            <button class="btn btn-danger" onclick="deletePost()">글 삭제</button>
            <button class="btn btn-secondary" onclick="goToMain()">목록으로</button>
        </div>
    </div>

    <script>
        // 새 글 작성 버튼 클릭 시 write_page.html로 이동
        function writeNew() {
            window.location.href = 'write_page.html';
        }

        // 글 수정 버튼 클릭 시 알림 후 수정 페이지 이동
        function editPost() {
            alert('글을 수정할 수 있습니다.');
            window.location.href = 'edit_page.html'; // 수정 페이지로 이동 (페이지 필요)
        }

        // 글 삭제 버튼 클릭 시 알림
        function deletePost() {
            alert('삭제되었습니다!');
        }

        // 목록 버튼 클릭 시 main.html로 이동
        function goToMain() {
            window.location.href = 'main.html';
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
